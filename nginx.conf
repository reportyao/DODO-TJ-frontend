server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ─── Gzip 压缩 ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # ─── Brotli 压缩（需要 ngx_brotli 模块）───────────────────────────
    # 如果 Nginx 已安装 brotli 模块，取消以下注释即可启用
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types
    #     text/plain
    #     text/css
    #     text/javascript
    #     application/javascript
    #     application/json
    #     application/xml
    #     image/svg+xml
    #     font/woff2;

    # ─── 预压缩文件优先（配合 vite-plugin-compression 生成的 .gz/.br 文件）
    gzip_static on;
    # brotli_static on;  # 需要 brotli 模块

    # ─── 静态资源长缓存（带 hash 的文件）──────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── i18n 语言文件缓存（短缓存，允许更新）─────────────────────────
    location /locales/ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        # 确保 JSON 文件也被 gzip 压缩
        gzip_types application/json;
    }

    # ─── 图片资源缓存 ─────────────────────────────────────────────────
    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ─── PWA manifest 和 service worker ───────────────────────────────
    location = /manifest.json {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    location = /service-worker.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ─── SPA 路由回退 ─────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # index.html 不缓存，确保每次获取最新版本
        location = /index.html {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # ─── 安全头 ───────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
