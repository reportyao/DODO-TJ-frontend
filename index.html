<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#2B5D3A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="DODO" />
  <link rel="apple-touch-icon" href="/dodo-logo.png" />
  <link rel="manifest" href="/manifest.json" />
  <title>DODO - WhatsApp & PWA</title>
  <!-- Build: __BUILD_TIME__ -->
  
  <style>
    /* 防止加载时闪烁 */
    #root {
      min-height: 100vh;
      background-color: #f9fafb;
    }
    
    /* 应用主题变量 */
    :root {
      --app-bg-color: #ffffff;
      --app-text-color: #000000;
      --app-hint-color: #999999;
      --app-link-color: #2B5D3A;
      --app-button-color: #2B5D3A;
      --app-button-text-color: #ffffff;
      /* iOS Safe Area 支持（修复 R25：iPhone 刘海屏底部导航被遮挡） */
      --safe-area-inset-top: env(safe-area-inset-top, 0px);
      --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
      --safe-area-inset-left: env(safe-area-inset-left, 0px);
      --safe-area-inset-right: env(safe-area-inset-right, 0px);
    }
  </style>
</head>
<body>
  <!-- 强制清除旧版 Service Worker 缓存，防止旧 JS 文件导致白屏 -->
  <!-- CACHE_BUST_VERSION: v8 -->
  <script>
    (function() {
      var CURRENT_SW_VERSION = 'v8';
      var SW_VERSION_KEY = 'sw_cache_version';
      var storedVersion = localStorage.getItem(SW_VERSION_KEY);
      
      if ('serviceWorker' in navigator) {
        if (storedVersion !== CURRENT_SW_VERSION) {
          // 版本不匹配：注销所有 SW 并清除所有缓存
          Promise.all([
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              return Promise.all(regs.map(function(r) { return r.unregister(); }));
            }),
            caches.keys().then(function(keys) {
              return Promise.all(keys.map(function(k) { return caches.delete(k); }));
            })
          ]).then(function() {
            localStorage.setItem(SW_VERSION_KEY, CURRENT_SW_VERSION);
            // 强制硬刷新页面以加载最新资源
            window.location.reload(true);
          });
        }
      } else {
        // 不支持 SW 的浏览器，直接更新版本号
        localStorage.setItem(SW_VERSION_KEY, CURRENT_SW_VERSION);
      }
    })();
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
